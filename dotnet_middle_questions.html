<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0f172a;
                --bg-card: #1e293b;
                --bg-input: #0f172a;
                --border-color: #334155;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            padding: 0 1rem;
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 2.5rem 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .search-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-main);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-bar input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            flex: 1;
            min-width: 140px;
            box-shadow: var(--shadow-sm);
        }

        .stat-n {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-l {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section {
            margin-bottom: 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .section:hover {
            box-shadow: var(--shadow-md);
        }

        .sec-head {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            user-select: none;
            background: var(--bg-card);
        }

        .sec-head:hover {
            background: rgba(0, 0, 0, 0.02);
        }
        
        @media (prefers-color-scheme: dark) {
            .sec-head:hover {
                background: rgba(255, 255, 255, 0.02);
            }
        }

        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .sec-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
        }

        /* SVG Иконки */
        .icon {
            width: 22px;
            height: 22px;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .chevron {
            color: var(--text-muted);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chevron.open {
            transform: rotate(180deg);
            color: var(--text-main);
        }

        .questions {
            padding: 0;
            display: none;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        .questions.open {
            display: block;
        }

        .q-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .q-item:first-child {
            border-top: none;
        }

        .q-item:hover {
            background: rgba(59, 130, 246, 0.04);
        }

        .q-num {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 24px;
            background: var(--bg-main);
            padding: 2px 6px;
            border-radius: 6px;
            text-align: center;
        }

        .q-text {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.6;
            flex: 1;
            font-weight: 400;
        }

        .q-ask {
            font-size: 12px;
            color: var(--accent-color);
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(2px);
            transition: all 0.2s ease;
        }

        .q-ask svg {
            width: 14px;
            height: 14px;
        }

        .q-item:hover .q-ask {
            opacity: 1;
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .no-results {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
            font-size: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

function render(filter=""){
  const sec = document.getElementById("sections");

  sec.innerHTML="";
  let visible=0;

  data.forEach((cat,ci)=>{

    visible+=qs.length;

    const div = document.createElement("div");

    const head = document.createElement("div");
    head.className="sec-head";
    
    // Подставляем SVG-иконку категории и кастомную иконку шеврона стрелки
    let currentChevron = icons.chevron;
    if(isOpen) {
        currentChevron = currentChevron.replace('chevron', 'chevron open');
    }

    // Присваиваем цвет SVG-иконке через инлайн-стиль color
    let coloredIcon = cat.icon.replace('class="icon"', `class="icon" style="color: ${cat.color}"`);

    head.innerHTML=`
      ${coloredIcon}
      <span class="sec-title">${cat.title}</span>
      <span class="badge" style="background:${cat.bg};color:${cat.tc}">${qs.length}</span>
      ${currentChevron}
    `;
    
    head.onclick=()=>{
      if(openSections.has(ci)) openSections.delete(ci); else openSections.add(ci);
      render(document.getElementById("search").value);
    };

    const qlist = document.createElement("div");
    qlist.className="questions"+(isOpen?" open":"");

    qs.forEach((q,qi)=>{
      const item = document.createElement("div");
      item.className="q-item";
      item.innerHTML=`
        <span class="q-num">${qi+1}</span>
        <div class="q-text">
            ${q}
            <div class="q-ask">Спросить ассистента ${icons.arrowUpRight}</div>
        </div>
      `;
      item.onclick=()=>sendPrompt("Объясни подробно: "+q);
      qlist.appendChild(item);
    });

    div.appendChild(head);
    div.appendChild(qlist);
    sec.appendChild(div);
  });

  noR.classList.toggle("hidden", visible>0);

  if(!filter){
    totalQ = data.reduce((s,c)=>s+c.questions.length,0);
    statsEl.innerHTML=`
      <div class="stat"><div class="stat-n">${totalQ}</div><div class="stat-l">всего вопросов</div></div>
      <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">тем</div></div>
      <div class="stat"><div class="stat-n">Middle+</div><div class="stat-l">уровень</div></div>
    `;
  } else {
    statsEl.innerHTML=`<div class="stat"><div class="stat-n">${visible}</div><div class="stat-l">найдено вопросов</div></div>`;
  }
}

function filterQuestions(val){ render(val); }

render();
</script>
</body>
</html>
