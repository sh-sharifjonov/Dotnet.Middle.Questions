                --bg-input: #0f172a;
                --border-color: #334155;
                --text-main: #f8fafc;

        * {

            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        body {

            background-color: var(--bg-main);

        .wrap {

            padding: 2.5rem 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .search-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-main);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);

            display: flex;
            gap: 16px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

            border: 1px solid var(--border-color);

            box-shadow: var(--shadow-sm);

            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-l {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section {
            margin-bottom: 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .section:hover {
            box-shadow: var(--shadow-md);
        }

        .sec-head {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            user-select: none;
            background: var(--bg-card);
        }

        .sec-head:hover {
            background: rgba(0, 0, 0, 0.02);
        }
        
        @media (prefers-color-scheme: dark) {
            .sec-head:hover {
                background: rgba(255, 255, 255, 0.02);
            }
        }

        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .sec-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
        }

        .icon {
            width: 22px;
            height: 22px;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .chevron {
            color: var(--text-muted);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chevron.open {
            transform: rotate(180deg);
            color: var(--text-main);
        }

        .questions {
            padding: 0;
            display: none;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        .questions.open {
            display: block;
        }

        .q-wrapper {
            border-top: 1px solid var(--border-color);
        }
        .q-wrapper:first-child {
            border-top: none;
        }

        .q-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .q-item:hover {
            background: rgba(59, 130, 246, 0.02);
        }

        .q-num {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 24px;
            background: var(--bg-main);
            padding: 2px 6px;
            border-radius: 6px;
            text-align: center;
        }

        .q-text-content {
            flex: 1;
        }

        .q-text {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.6;
            font-weight: 500;
        }

        .q-ask {
            font-size: 12px;
            color: var(--accent-color);
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(2px);
            transition: all 0.2s ease;
        }

        .q-ask svg {
            width: 14px;
            height: 14px;
        }

        .q-item:hover .q-ask {
            opacity: 1;
            transform: translateY(0);
        }

        .answer {
            padding: 0 1.5rem 1.25rem 3.8rem;
            font-size: 14.5px;
            color: var(--text-main);
            line-height: 1.6;
            display: none;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .answer.open {
            display: block;
        }

        .answer ul {
            margin-left: 1.25rem;
            margin-top: 6px;
        }
        
        .answer li {
            margin-bottom: 4px;
        }

        .hidden {
            display: none !important;
        }

        .no-results {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
            font-size: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

const data = [
  {
    title:"C# и .NET Core / Runtime",icon: icons.csharp,color:"#185FA5",bg:"#E6F1FB",tc:"#0C447C",
    questions:[
      {
        q: "Чем отличается .NET Framework от .NET Core / .NET 5+?",
        a: "<ul><li><b>Кроссплатформенность:</b> Framework работает только под Windows. Core / .NET 5+ кроссплатформенны (Windows, Linux, macOS).</li><li><b>Архитектура:</b> Framework монолитен и ставится в систему глобально. Core — модульный, легковесный, поставляется как Nuget и поддерживает self-contained сборки.</li><li><b>Производительность:</b> Core изначально переписан с упором на производительность (новый JIT, Span&lt;T&gt;, оптимизации памяти).</li></ul>"

      {
        q: "Как работает сборщик мусора (GC) в .NET: поколения, LOH, финализация?",
        a: "<ul><li><b>Поколения:</b> Куча делится на Gen 0 (новые короткоживущие объекты), Gen 1 (буфер) и Gen 2 (долгоживущие). Сборка в Gen 0 быстрая и частая, в Gen 2 — редкая и долгая.</li><li><b>LOH (Large Object Heap):</b> Объекты >85,000 байт попадают сюда напрямую в Gen 2. Память LOH по умолчанию не дефрагментируется ради экономии ресурсов, а просто переиспользуется.</li><li><b>Финализация:</b> Объекты с деструкторами перед очисткой попадают в Finalization Queue. Их очистка требует как минимум двух циклов сборки мусора.</li></ul>"

      {

      {
        q: "Value types vs reference types: стек, куча, boxing/unboxing, struct vs class?",
        a: "<ul><li><b>Value types (структуры, enum, int):</b> Хранят значения напрямую, обычно размещаются на стеке, передаются копированием значения.</li><li><b>Reference types (классы, интерфейсы, строки):</b> Хранят ссылку на объект в управляемой куче, передаются по ссылке.</li><li><b>Boxing/Unboxing:</b> Boxing — упаковка значимого типа в ссылочный (объект копируется со стека в кучу, нагружая GC). Unboxing — обратное извлечение.</li></ul>"

      {
        q: "Как работает async/await под капотом? Что такое SynchronizationContext?",
        a: "<ul><li><b>Под капотом:</b> Компилятор разворачивает асинхронный метод в структуру-автомат (<code>State Machine</code>). Код выполняется синхронно до первого незавершенного <code>await</code>, поток освобождается, а остаток метода регистрируется как продолжение (continuation).</li><li><b>SynchronizationContext:</b> Объект, определяющий, в каком потоке (UI поток или пул потоков) выполнится продолжение метода. В ASP.NET Core этот контекст отсутствует, все продолжения идут на ThreadPool.</li></ul>"
      },
      {
        q: "Разница Task, ValueTask, Thread, ThreadPool?",
        a: "<ul><li><b>Thread:</b> Физический поток ОС, создавать вручную дорого (~1МБ на стек).</li><li><b>ThreadPool:</b> Пул готовых потоков CLR, исключающий накладные расходы на их создание.</li><li><b>Task:</b> Ссылочная абстракция над асинхронной операцией. Выделяется в куче.</li><li><b>ValueTask:</b> Структура (значимый тип). Используется вместо Task, если операция часто завершается синхронно, чтобы избежать лишней аллокации в куче.</li></ul>"
      },
      {
        q: "Что такое IEnumerable vs IQueryable? Где используется каждый?",
        a: "<ul><li><b>IEnumerable:</b> Работает с коллекциями в оперативной памяти (In-Memory). Фильтрация скачивает все элементы в память приложения и фильтрует на стороне C#.</li><li><b>IQueryable:</b> Работает с удаленными источниками данных (EF Core). Строит дерево выражений (Expression Tree) и транслирует его в SQL-запрос, выполняя фильтрацию на сервере БД.</li></ul>"
      },
      {

        a: "<ul><li><b>Отложенное выполнение:</b> Запрос LINQ не выполняется в момент создания, а только при итерации (в <code>foreach</code>, <code>ToList()</code>, <code>Count()</code>).</li><li><b>Деревья выражений:</b> Код представляется в виде структуры данных (дерева объектов), которую провайдер БД может распарсить и превратить в SQL-код.</li></ul>"
      },
      {
        q: "Generics: constraints, covariance/contravariance (in/out)?",
        a: "<ul><li><b>Constraints (ограничения):</b> Ключевое слово <code>where</code>, задающее правила для типа (например, <code>where T : class, new()</code>).</li><li><b>Ковариантность (out T):</b> Позволяет использовать более производный тип, чем задан (только для возвращаемых значений, например, <code>IEnumerable&lt;out T&gt;</code>).</li><li><b>Контравариантность (in T):</b> Позволяет использовать более базовый тип, чем задан (только для входных параметров, например, <code>Action&lt;in T&gt;</code>).</li></ul>"
      },
      {
        q: "Delegates, Action, Func, Predicate — разница и применение?",
        a: "<ul><li><b>Delegate:</b> Типобезопасный указатель на метод.</li><li><b>Func&lt;T, TResult&gt;:</b> Встроенный делегат для методов, принимающих параметры и возвращающих значение.</li><li><b>Action&lt;T&gt;:</b> Делегат для методов, ничего не возвращающих (void).</li><li><b>Predicate&lt;T&gt;:</b> Делегат, принимающий один параметр и возвращающий bool (эквивалент <code>Func&lt;T, bool&gt;</code>).</li></ul>"
      },
      {
        q: "Что такое events, multicast delegates, утечки памяти через события?",
        a: "<ul><li><b>Multicast-делегаты:</b> Делегаты, хранящие ссылки на несколько методов и вызывающие их по цепочке.</li><li><b>Events (события):</b> Инкапсулированная обертка над делегатом, позволяющая внешнему коду только подписываться (<code>+=</code>) и отписываться (<code>-=</code>).</li><li><b>Утечки памяти:</b> Если долгоживущий объект (издатель) держит ссылку на метод короткоживущего объекта (подписчика), GC не сможет удалить подписчика. Нужно отписываться.</li></ul>"
      },
      {
        q: "Span&lt;T&gt;, Memory&lt;T&gt;, ArrayPool — зачем и когда?",
        a: "<ul><li><b>Span&lt;T&gt;:</b> Структура <code>ref struct</code>, представляющая непрерывный кусок памяти (стек/куча) без выделения памяти в куче при взятии срезов (подстрок).</li><li><b>Memory&lt;T&gt;:</b> Похож на Span, но может жить в куче и использоваться внутри асинхронных методов с await.</li><li><b>ArrayPool:</b> Пул переиспользуемых массивов. Исключает фрагментацию кучи при частом выделении больших буферов данных.</li></ul>"
      },
      {
        q: "Reflection vs Source Generators — разница, производительность?",
        a: "<ul><li><b>Reflection (Рефлексия):</b> Анализ метаданных и динамический вызов кода в рантайме (Runtime). Работает медленно, мешает AOT-компиляции.</li><li><b>Source Generators:</b> Анализ и автоматическая генерация C#-кода на этапе компиляции (Compile time). Переносит нагрузку на сборку, обеспечивая максимальную скорость.</li></ul>"
      },
      {
        q: "Атрибуты: создание, чтение через Reflection, компилируемые атрибуты?",
        a: "<ul><li><b>Создание:</b> Наследование от класса <code>System.Attribute</code>.</li><li><b>Чтение:</b> Считывание метаданных с типов или свойств в рантайме с помощью методов рефлексии (<code>GetCustomAttributes</code>).</li><li><b>Компилируемые:</b> Атрибуты (например, <code>[Obsolete]</code>, <code>[Conditional]</code>), обрабатываемые самим компилятором для генерации варнингов или изменения логики сборки.</li></ul>"
      },
      {
        q: "Что такое record types и positional records в C# 9+?",
        a: "<ul><li><b>Record types:</b> Ссылочные или значимые типы, ориентированные на неизменяемость (Immutability) и сравниваемые по значению свойств, а не по ссылке.</li><li><b>Positional records:</b> Краткая запись (<code>record Person(string Name, int Age);</code>), для которой компилятор сам генерирует init-свойства, конструктор и деконструктор.</li></ul>"
      },
      {
        q: "Pattern matching: switch expressions, property patterns, when guards?",
        a: "<ul><li><b>Switch expressions:</b> Компактный синтаксис switch, возвращающий значение напрямую.</li><li><b>Property patterns:</b> Проверка свойств объекта (например, <code>obj is Person { Age: > 18 }</code>).</li><li><b>When guards:</b> Дополнительные условия к паттерну (<code>case Student s when s.Gpa > 4.5</code>).</li></ul>"

let openSections = new Set();
let openAnswers = new Set();
let totalQ = 0;

function toggleAnswer(ci, qi, event) {
  const key = `${ci}-${qi}`;
  if(openAnswers.has(key)) {
    openAnswers.delete(key);
  } else {
    openAnswers.add(key);
  }
  render(document.getElementById("search").value);
}

function render(filter=""){
  const sec = document.getElementById("sections");
  const noR = document.getElementById("no-results");
  const statsEl = document.getElementById("stats");
  sec.innerHTML="";
  let visible=0;

  data.forEach((cat,ci)=>{
    const qs = filter ? cat.questions.filter(item=>item.q.toLowerCase().includes(filter.toLowerCase())) : cat.questions;
    if(filter && qs.length===0) return;
    visible+=qs.length;

    const isSectionOpen = openSections.has(ci) || filter.length>0;
    const div = document.createElement("div");
    div.className="section";

    const head = document.createElement("div");
    head.className="sec-head";
    
    let currentChevron = icons.chevron;
    if(isSectionOpen) {
        currentChevron = currentChevron.replace('chevron', 'chevron open');
    }

    let coloredIcon = cat.icon.replace('class="icon"', `class="icon" style="color: ${cat.color}"`);

    head.innerHTML=`
      ${coloredIcon}
      <span class="sec-title">${cat.title}</span>
      <span class="badge" style="background:${cat.bg};color:${cat.tc}">${qs.length}</span>
      ${currentChevron}
    `;
    
    head.onclick=()=>{
      if(openSections.has(ci)) openSections.delete(ci); else openSections.add(ci);
      render(document.getElementById("search").value);
    };

    const qlist = document.createElement("div");
    qlist.className="questions"+(isSectionOpen?" open":"");

    qs.forEach((itemData,qi)=>{
      const key = `${ci}-${qi}`;
      const isAnswerOpen = openAnswers.has(key) || filter.length>0;
      
      const qWrapper = document.createElement("div");
      qWrapper.className = "q-wrapper";

      const item = document.createElement("div");
      item.className="q-item";
      item.innerHTML=`
        <span class="q-num">${qi+1}</span>
        <div class="q-text-content">
            <div class="q-text">${itemData.q}</div>
        </div>
      `;
      item.onclick=()=>toggleAnswer(ci, qi);
      
      const ansDiv = document.createElement("div");
      ansDiv.className = "answer" + (isAnswerOpen ? " open" : "");
      ansDiv.innerHTML = itemData.a;

      qWrapper.appendChild(item);
      qWrapper.appendChild(ansDiv);
      qlist.appendChild(qWrapper);
    });

    div.appendChild(head);
    div.appendChild(qlist);
    sec.appendChild(div);
  });

  noR.classList.toggle("hidden", visible>0);

  if(!filter){
    totalQ = data.reduce((s,c)=>s+c.questions.length,0);
    statsEl.innerHTML=`
      <div class="stat"><div class="stat-n">${totalQ}</div><div class="stat-l">всего вопросов</div></div>
      <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">тем</div></div>
      <div class="stat"><div class="stat-n">Middle+</div><div class="stat-l">уровень</div></div>
      <div class="stat"><div class="stat-n">${currentVisits}</div><div class="stat-l">ваших визитов</div></div>
    `;
  } else {
    statsEl.innerHTML=`<div class="stat"><div class="stat-n">${visible}</div><div class="stat-l">найдено вопросов</div></div>`;
  }
}

function filterQuestions(val){ render(val); }

render();
