            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);

        }

            height: 22px;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;

        }

            border-top: 1px solid var(--border-color);

            border-top: none;
        }

        .q-item {

            align-items: flex-start;

            padding: 1rem 1.5rem;
            cursor: pointer;

            color: var(--text-muted);

            background: var(--bg-main);

            color: var(--text-main);
            line-height: 1.6;
            font-weight: 500;

            font-size: 12px;

            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            opacity: 0;

            height: 14px;

            color: var(--text-main);
            line-height: 1.6;

            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

const data = [

    title:"C# и .NET Core / Runtime",icon: icons.csharp,color:"#185FA5",bg:"#E6F1FB",tc:"#0C447C",

      {
        q: "Чем отличается .NET Framework от .NET Core / .NET 5+?",

      {

        a: "<ul><li><b>Поколения:</b> Gen 0 — новые короткоживущие объекты (сборка ~мс). Gen 1 — промежуточный буфер. Gen 2 — долгоживущие синглтоны и кэши (сборка — сотни мс, Stop-the-World).</li><li><b>LOH:</b> Объекты &gt;85 KB попадают в Large Object Heap, сразу в Gen 2. Не дефрагментируется по умолчанию — это причина фрагментации при частых больших аллокациях. Решение: <code>GCSettings.LargeObjectHeapCompactionMode</code> или <code>ArrayPool</code>.</li><li><b>Финализация:</b> Объекты с деструктором (~<code>Finalize()</code>) не собираются сразу — попадают в очередь финализатора и требуют минимум 2 цикла GC. Именно поэтому Dispose/using предпочтительнее деструкторов.</li></ul>"

      {

      },
      {
        q: "Value types vs reference types: стек, куча, boxing/unboxing, struct vs class?",

      },
      {
        q: "Как работает async/await под капотом? Что такое SynchronizationContext?",
        a: "<ul><li><b>State Machine:</b> Компилятор разворачивает метод с <code>await</code> в структуру-автомат с полем состояния. При каждом <code>await</code> — проверка, завершена ли операция. Если нет — поток освобождается, регистрируется continuation. Метод буквально разрезается на кусочки.</li><li><b>SynchronizationContext:</b> Определяет, в каком контексте выполнится continuation. В WPF/WinForms — возврат в UI-поток. В ASP.NET Core — <code>null</code>, continuation идёт на любом потоке ThreadPool. Именно поэтому в библиотечном коде нужен <code>ConfigureAwait(false)</code> — чтобы не захватывать чужой контекст.</li><li><b>Ловушка:</b> <code>async void</code> — исключения из него нельзя поймать через try/catch снаружи. Только для event-хендлеров.</li></ul>"

      {
        q: "Разница Task, ValueTask, Thread, ThreadPool?",
        a: "<ul><li><b>Thread:</b> Физический поток ОС (~1 МБ стека). Создавать вручную дорого и плохо масштабируется. Нужен только для долгоживущих выделенных потоков.</li><li><b>ThreadPool:</b> Пул переиспользуемых потоков CLR. Автоматически масштабируется. Task.Run и async/await работают на нём.</li><li><b>Task:</b> Ссылочный тип — аллокация в куче при каждом вызове async-метода. Нормально для большинства случаев.</li><li><b>ValueTask:</b> Структура (нет аллокации), оптимальна когда операция <em>чаще всего</em> завершается синхронно (кэш-хиты, буферизированное чтение). Пример: <code>ValueTask&lt;int&gt; ReadAsync()</code> в высоконагруженном парсере. Нельзя await-ить дважды.</li></ul>"
      },
      {
        q: "Что такое IEnumerable vs IQueryable? Где используется каждый?",
        a: "<ul><li><b>IEnumerable&lt;T&gt;:</b> Выполняется в памяти процесса. <code>dbContext.Users.AsEnumerable().Where(u => u.Age > 18)</code> — сначала скачает ВСЕ записи из БД, потом отфильтрует в C#. Подходит для in-memory коллекций.</li><li><b>IQueryable&lt;T&gt;:</b> Строит дерево выражений (Expression Tree), которое провайдер (EF Core) транслирует в SQL. <code>dbContext.Users.Where(u => u.Age > 18)</code> — выполняет <code>WHERE age > 18</code> на сервере БД. Всегда предпочтительнее для работы с EF Core до материализации (.ToList()).</li><li><b>Ловушка:</b> Если случайно вернуть IQueryable из репозитория и добавить фильтр после — может выполниться несколько запросов или скачать лишние данные.</li></ul>"
      },
      {
        q: "Как работает LINQ: отложенное выполнение, деревья выражений?",
        a: "<ul><li><b>Отложенное выполнение:</b> <code>var q = list.Where(x => x > 0).Select(x => x * 2)</code> — запрос не выполняется до <code>ToList()</code>, <code>foreach</code> или <code>Count()</code>. Это позволяет цепочку операций выполнить за один проход. Ловушка: многократная итерация IEnumerable выполняет запрос каждый раз заново.</li><li><b>Expression Trees:</b> Для IQueryable лямбда компилируется не в IL, а в дерево объектов (<code>Expression&lt;Func&lt;T, bool&gt;&gt;</code>). EF Core парсит это дерево и генерирует SQL. Именно поэтому внутри <code>.Where()</code> нельзя использовать произвольные C#-методы — они непрозрачны для транслятора.</li></ul>"
      },
      {
        q: "Generics: constraints, covariance/contravariance (in/out)?",
        a: "<ul><li><b>Constraints:</b> <code>where T : class, IEntity, new()</code> — тип должен быть классом, реализовывать интерфейс и иметь конструктор без параметров. Без constraints нельзя вызвать методы или создать экземпляр.</li><li><b>Ковариантность (out T):</b> <code>IEnumerable&lt;Dog&gt;</code> можно присвоить <code>IEnumerable&lt;Animal&gt;</code>. Работает только если T используется только в позиции возврата (out). Например: <code>IProducer&lt;out T&gt;</code>.</li><li><b>Контравариантность (in T):</b> <code>Action&lt;Animal&gt;</code> можно присвоить <code>Action&lt;Dog&gt;</code>. T только на входе. Например: <code>IComparer&lt;in T&gt;</code>. Мнемоника: out — потребитель читает, in — поставщик принимает.</li></ul>"
      },
      {
        q: "Delegates, Action, Func, Predicate — разница и применение?",
        a: "<ul><li><b>Delegate:</b> Типобезопасный указатель на метод. Базовый механизм, на котором построены события и лямбды.</li><li><b>Func&lt;TIn, TOut&gt;:</b> Обобщённый делегат для методов с возвратом. До 16 входных параметров. Пример: <code>Func&lt;User, string&gt; getName = u => u.Name</code>.</li><li><b>Action&lt;T&gt;:</b> То же, но без возврата (void). Пример: <code>Action&lt;string&gt; log = Console.WriteLine</code>.</li><li><b>Predicate&lt;T&gt;:</b> Сокращение для <code>Func&lt;T, bool&gt;</code>. Исторически появился раньше в API типа <code>List&lt;T&gt;.FindAll()</code>. В новом коде предпочтительнее Func.</li></ul>"
      },
      {
        q: "Что такое events, multicast delegates, утечки памяти через события?",
        a: "<ul><li><b>Multicast-делегаты:</b> Делегат хранит invocation list — несколько методов вызываются по цепочке. Возвращается результат последнего. При исключении в одном вся цепочка прерывается.</li><li><b>Events:</b> Ограничивают доступ к делегату — внешний код может только подписаться (<code>+=</code>) и отписаться (<code>-=</code>), но не вызвать напрямую или заменить список.</li><li><b>Утечка:</b> <code>publisher.Updated += subscriber.OnUpdate</code> — publisher держит ссылку на subscriber. Если publisher — singleton, а subscriber создаётся многократно и не отписывается — это классическая утечка. Решение: <code>-=</code> в Dispose или WeakReference.</li></ul>"

let openSections = new Set();
let openAnswers = new Set();
let totalQ = 0;

function toggleAnswer(ci, qi, event) {
  const key = `${ci}-${qi}`;
  if(openAnswers.has(key)) {
    openAnswers.delete(key);
  } else {
    openAnswers.add(key);
  }
  render(document.getElementById("search").value);
}

function render(filter=""){
  const sec = document.getElementById("sections");
  const noR = document.getElementById("no-results");
  const statsEl = document.getElementById("stats");
  sec.innerHTML="";
  let visible=0;

  data.forEach((cat,ci)=>{
    const qs = filter ? cat.questions.filter(item=>item.q.toLowerCase().includes(filter.toLowerCase())) : cat.questions;
    if(filter && qs.length===0) return;
    visible+=qs.length;

    const isSectionOpen = openSections.has(ci) || filter.length>0;
    const div = document.createElement("div");
    div.className="section";

    const head = document.createElement("div");
    head.className="sec-head";
    
    let currentChevron = icons.chevron;
    if(isSectionOpen) {
        currentChevron = currentChevron.replace('chevron', 'chevron open');
    }

    let coloredIcon = cat.icon.replace('class="icon"', `class="icon" style="color: ${cat.color}"`);

    head.innerHTML=`
      ${coloredIcon}
      <span class="sec-title">${cat.title}</span>
      <span class="badge" style="background:${cat.bg};color:${cat.tc}">${qs.length}</span>
      ${currentChevron}
    `;
    
    head.onclick=()=>{
      if(openSections.has(ci)) openSections.delete(ci); else openSections.add(ci);
      render(document.getElementById("search").value);
    };

    const qlist = document.createElement("div");
    qlist.className="questions"+(isSectionOpen?" open":"");

    qs.forEach((itemData,qi)=>{
      const key = `${ci}-${qi}`;
      const isAnswerOpen = openAnswers.has(key) || filter.length>0;
      
      const qWrapper = document.createElement("div");
      qWrapper.className = "q-wrapper";

      const item = document.createElement("div");
      item.className="q-item";
      item.innerHTML=`
        <span class="q-num">${qi+1}</span>
        <div class="q-text-content">
            <div class="q-text">${itemData.q}</div>
        </div>
      `;
      item.onclick=()=>toggleAnswer(ci, qi);
      
      const ansDiv = document.createElement("div");
      ansDiv.className = "answer" + (isAnswerOpen ? " open" : "");
      ansDiv.innerHTML = itemData.a;

      qWrapper.appendChild(item);
      qWrapper.appendChild(ansDiv);
      qlist.appendChild(qWrapper);
    });

    div.appendChild(head);
    div.appendChild(qlist);
    sec.appendChild(div);
  });

  noR.classList.toggle("hidden", visible>0);

  if(!filter){
    totalQ = data.reduce((s,c)=>s+c.questions.length,0);
    statsEl.innerHTML=`
      <div class="stat"><div class="stat-n">${totalQ}</div><div class="stat-l">всего вопросов</div></div>
      <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">тем</div></div>
      <div class="stat"><div class="stat-n">Middle+</div><div class="stat-l">уровень</div></div>
      <div class="stat"><div class="stat-n">${currentVisits}</div><div class="stat-l">ваших визитов</div></div>
    `;
  } else {
    statsEl.innerHTML=`<div class="stat"><div class="stat-n">${visible}</div><div class="stat-l">найдено вопросов</div></div>`;
  }
}

function filterQuestions(val){ render(val); }

render();
